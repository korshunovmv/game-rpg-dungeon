<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Подземелья — Pixel RPG</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <header class="header">
      <h1>⚔ Подземелья</h1>
      <p class="subtitle">Герой сам исследует лабиринт</p>
      <p class="version" id="app-version">v0.1.0</p>
    </header>

    <main class="main">
      <div class="game-wrap">
        <canvas id="game" width="640" height="480"></canvas>
        <div class="overlay" id="overlay"></div>
        <div class="class-select" id="class-select">
          <h2>Выберите профессию</h2>
          <div class="class-grid">
            <button class="class-card" data-class="warrior">
              <canvas class="class-preview" width="48" height="48" data-class="warrior"></canvas>
              <span class="class-name">Воин</span>
              <span class="class-desc">Много HP и брони</span>
            </button>
            <button class="class-card" data-class="archer">
              <canvas class="class-preview" width="48" height="48" data-class="archer"></canvas>
              <span class="class-name">Лучник</span>
              <span class="class-desc">Атакует с 3 клеток</span>
            </button>
            <button class="class-card" data-class="mage">
              <canvas class="class-preview" width="48" height="48" data-class="mage"></canvas>
              <span class="class-name">Маг</span>
              <span class="class-desc">6 заклинаний: огонь, лёд, молния</span>
            </button>
            <button class="class-card" data-class="thief">
              <canvas class="class-preview" width="48" height="48" data-class="thief"></canvas>
              <span class="class-name">Вор</span>
              <span class="class-desc">+50% золота, обезвреживает ловушки</span>
            </button>
            <button class="class-card" data-class="necromancer">
              <canvas class="class-preview" width="48" height="48" data-class="necromancer"></canvas>
              <span class="class-name">Некромант</span>
              <span class="class-desc">Тёмная магия, скелеты-слуги</span>
            </button>
          </div>
        </div>
      </div>

      <aside class="panel">
        <section class="stats">
          <h2>Герой</h2>
          <div class="stat-row"><span>Имя</span><strong id="hero-name">Арион</strong></div>
          <div class="stat-row"><span>Класс</span><strong id="hero-class">—</strong></div>
          <div class="stat-row"><span>Уровень</span><strong id="hero-level">1</strong></div>
          <div class="stat-row"><span>HP</span><strong id="hero-hp">—</strong></div>
          <div class="stat-row"><span>ATK</span><strong id="hero-atk">—</strong></div>
          <div class="stat-row"><span>DEF</span><strong id="hero-def">—</strong></div>
          <div class="stat-row"><span>Оружие</span><strong id="hero-weapon">—</strong></div>
          <div class="stat-row"><span>Броня</span><strong id="hero-armor">—</strong></div>
          <div class="stat-row" id="minions-row" style="display:none"><span>Скелеты</span><strong id="hero-minions">0</strong></div>
          <div class="stat-row"><span>Золото</span><strong id="hero-gold">0</strong></div>
          <div class="stat-row"><span>Этаж</span><strong id="hero-floor">1</strong></div>
        </section>

        <section class="log">
          <h2>Журнал</h2>
          <ul id="log"></ul>
        </section>

        <section class="controls">
          <button id="btn-pause" class="btn">⏸ Пауза</button>
          <button id="btn-speed" class="btn">⚡ Скорость ×2</button>
          <button id="btn-new" class="btn btn-accent">↻ Новое подземелье</button>
        </section>
      </aside>
    </main>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
